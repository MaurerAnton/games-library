<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotional Tapestry</title>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --text: #c8c8d8;
  --grey: #666680;
  --border: #2a2a3a;
  --green: #00ff88;
  --cyan: #00e5ff;
  --purple: #aa44ff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; }
#app { display: flex; min-height: 100vh; }
#sidebar {
  width: 280px; background: var(--bg2); border-right: 1px solid var(--border);
  padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto;
}
#main { flex: 1; padding: 24px; overflow-y: auto; }
h1 { font-size: 14px; letter-spacing: 3px; color: var(--cyan); }
h2 { font-size: 12px; letter-spacing: 2px; color: var(--grey); margin-top: 8px; }
label { font-size: 11px; color: var(--grey); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; display: block; }
input[type="date"], input[type="text"] {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: 'Courier New', monospace; font-size: 13px;
  padding: 8px 10px; border-radius: 3px; outline: none;
}
input:focus { border-color: var(--cyan); }
.mood-btns { display: flex; gap: 6px; margin-top: 4px; }
.mood-btn {
  width: 44px; height: 44px; border-radius: 6px; border: 2px solid var(--border);
  background: transparent; font-size: 20px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.mood-btn:hover, .mood-btn.active { border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,229,255,0.3); }
.mood-btn[data-mood="1"] { --mc: #ff4444; }
.mood-btn[data-mood="2"] { --mc: #ff8844; }
.mood-btn[data-mood="3"] { --mc: #ffcc00; }
.mood-btn[data-mood="4"] { --mc: #00ff88; }
.mood-btn[data-mood="5"] { --mc: #00e5ff; }
.mood-btn.active { border-color: var(--mc); box-shadow: 0 0 8px var(--mc); }
.btn {
  background: transparent; border: 1px solid var(--border); color: var(--text);
  font-family: 'Courier New', monospace; font-size: 12px; padding: 8px 16px;
  cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
}
.btn:hover { border-color: var(--cyan); color: var(--cyan); }
.btn.primary { background: var(--cyan); color: var(--bg); border-color: var(--cyan); }
#calendar { display: flex; flex-direction: column; gap: 12px; }
.month-row { display: flex; flex-direction: column; gap: 4px; }
.month-label { font-size: 12px; color: var(--purple); letter-spacing: 2px; margin-bottom: 4px; }
.days-grid { display: flex; flex-wrap: wrap; gap: 3px; }
.day-cell {
  width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--grey); cursor: default; position: relative;
}
.day-cell.has-data { cursor: pointer; }
.day-cell:hover .tooltip { display: block; }
.tooltip {
  display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
  background: var(--bg2); border: 1px solid var(--border); border-radius: 4px;
  padding: 6px 10px; font-size: 11px; white-space: nowrap; z-index: 10;
  color: var(--text);
}
#poster-area { margin-top: 24px; }
#poster-canvas { max-width: 100%; border: 1px solid var(--border); }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>EMOTIONAL TAPESTRY</h1>
    <div>
      <label>DATE</label>
      <input type="date" id="date-input">
    </div>
    <div>
      <label>MOOD</label>
      <div class="mood-btns">
        <button class="mood-btn" data-mood="1" title="Terrible">😢</button>
        <button class="mood-btn" data-mood="2" title="Bad">😟</button>
        <button class="mood-btn" data-mood="3" title="Okay">😐</button>
        <button class="mood-btn" data-mood="4" title="Good">😊</button>
        <button class="mood-btn" data-mood="5" title="Great">😄</button>
      </div>
    </div>
    <div>
      <label>NOTE (optional)</label>
      <input type="text" id="note-input" placeholder="one line...">
    </div>
    <button class="btn primary" id="save-btn">SAVE</button>
    <hr style="border-color: var(--border)">
    <button class="btn" id="poster-btn">GENERATE POSTER</button>
    <button class="btn" id="download-btn">DOWNLOAD PNG</button>
  </div>
  <div id="main">
    <div id="calendar"></div>
    <div id="poster-area">
      <canvas id="poster-canvas"></canvas>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'emotional-tapestry-data';
const MOOD_COLORS = { 1: '#ff4444', 2: '#ff8844', 3: '#ffcc00', 4: '#00ff88', 5: '#00e5ff' };
const MOOD_EMOJI = { 1: '😢', 2: '😟', 3: '😐', 4: '😊', 5: '😄' };
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const DAYS_IN_MONTH = [31,28,31,30,31,30,31,31,30,31,30,31];

let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let selectedMood = null;

const dateInput = document.getElementById('date-input');
const noteInput = document.getElementById('note-input');
const calendarEl = document.getElementById('calendar');
const posterCanvas = document.getElementById('poster-canvas');

dateInput.value = new Date().toISOString().split('T')[0];

document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedMood = parseInt(btn.dataset.mood);
  });
});

document.getElementById('save-btn').addEventListener('click', () => {
  const date = dateInput.value;
  if (!date || !selectedMood) return;
  data[date] = { mood: selectedMood, note: noteInput.value };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  renderCalendar();
  noteInput.value = '';
});

function renderCalendar() {
  calendarEl.innerHTML = '';
  for (let m = 0; m < 12; m++) {
    const row = document.createElement('div');
    row.className = 'month-row';
    const label = document.createElement('div');
    label.className = 'month-label';
    label.textContent = MONTHS[m];
    row.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'days-grid';
    for (let d = 1; d <= DAYS_IN_MONTH[m]; d++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      cell.textContent = d;
      const key = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if (data[key]) {
        cell.classList.add('has-data');
        cell.style.background = MOOD_COLORS[data[key].mood];
        cell.style.color = '#0a0a0f';
        const tip = document.createElement('div');
        tip.className = 'tooltip';
        tip.textContent = `${MONTHS[m]} ${d}: ${MOOD_EMOJI[data[key].mood]}${data[key].note ? ' — ' + data[key].note : ''}`;
        cell.appendChild(tip);
      }
      grid.appendChild(cell);
    }
    row.appendChild(grid);
    calendarEl.appendChild(row);
  }
}

function generatePoster() {
  const canvas = posterCanvas;
  const c = canvas.getContext('2d');
  const cellW = 22, cellH = 22, padX = 60, padY = 60, gap = 3;
  canvas.width = padX + 12 * (cellW + gap) + 20;
  canvas.height = padY + 31 * (cellH + gap) + 60;

  c.fillStyle = '#0a0a0f';
  c.fillRect(0, 0, canvas.width, canvas.height);

  c.fillStyle = '#00e5ff';
  c.font = '16px "Courier New", monospace';
  c.textAlign = 'center';
  c.fillText('My 2026 — A Year in Color', canvas.width / 2, 30);

  c.textAlign = 'right';
  c.font = '10px "Courier New", monospace';
  c.fillStyle = '#666680';
  for (let d = 1; d <= 31; d++) {
    c.fillText(d, padX - 8, padY + (d - 1) * (cellH + gap) + cellH / 2 + 4);
  }

  c.textAlign = 'center';
  for (let m = 0; m < 12; m++) {
    const x = padX + m * (cellW + gap) + cellW / 2;
    c.fillStyle = '#aa44ff';
    c.fillText(MONTHS[m], x, padY - 8);
    for (let d = 1; d <= DAYS_IN_MONTH[m]; d++) {
      const key = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const y = padY + (d - 1) * (cellH + gap);
      c.fillStyle = data[key] ? MOOD_COLORS[data[key].mood] : '#1a1a25';
      c.beginPath();
      c.roundRect(padX + m * (cellW + gap), y, cellW, cellH, 3);
      c.fill();
    }
  }

  const legendY = padY + 31 * (cellH + gap) + 20;
  c.textAlign = 'center';
  c.font = '10px "Courier New", monospace';
  for (let i = 1; i <= 5; i++) {
    const lx = canvas.width / 2 - 80 + (i - 1) * 40;
    c.fillStyle = MOOD_COLORS[i];
    c.fillRect(lx, legendY, 12, 12);
    c.fillStyle = '#c8c8d8';
    c.fillText(MOOD_EMOJI[i], lx + 6, legendY + 24);
  }
}

document.getElementById('poster-btn').addEventListener('click', generatePoster);

document.getElementById('download-btn').addEventListener('click', () => {
  generatePoster();
  const link = document.createElement('a');
  link.download = 'tapestry-2026.png';
  link.href = posterCanvas.toDataURL('image/png');
  link.click();
});

renderCalendar();
</script>
</body>
</html>
